<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colors - UIverse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <aside class="sidebar">
    <h2>UIverse</h2>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="button.html">Buttons</a></li>
      <li><a href="cards.html">Cards</a></li>
      <li><a href="inputs.html">Inputs</a></li>
      <li><a href="form.html">Forms</a></li>
      <li><a href="navbar.html">Navbars</a></li>
      <li><a href="footer.html">Footers</a></li>
      <li><a href="alerts.html">Alerts</a></li>
      <li><a href="badges.html">Badges</a></li>
      <li><a href="loaders.html">Loaders</a></li>
      <li><a href="pricing.html">Pricing</a></li>
      <li><a href="color.html">Colors</a></li>
    </ul>
    <button id="theme-toggle">🌙 Dark Mode</button>
  </aside>

  <div class="sidebar-backdrop"></div>

  <div class="content-wrapper">
    <nav class="navbar">
      <div class="nav-left">
        <button class="menu-toggle">☰</button>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Search colors..." />
        </div>
      </div>
      <div class="nav-right">
        <button class="nav-btn ghost">My Collection</button>
        <button class="nav-btn primary">Add Component</button>
      </div>
    </nav>

    <main class="main">
      <div class="page-header" style="margin-bottom: 40px;">
        <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 10px;">Colors</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem;">Curated color palettes for modern web interfaces.</p>
      </div>

      <div class="features">
        <div class="component-card" data-name="color primary hex">
          <h3>Primary Palette</h3>
          <div style="padding: 20px 0; display: flex; flex-wrap: wrap; gap: 15px;">
            <div style="width: 80px; text-align: center;">
              <div style="height: 60px; background: #6366f1; border-radius: 12px; margin-bottom: 8px;"></div>
              <code style="font-size: 0.8rem;">#6366f1</code>
            </div>
            <div style="width: 80px; text-align: center;">
              <div style="height: 60px; background: #ec4899; border-radius: 12px; margin-bottom: 8px;"></div>
              <code style="font-size: 0.8rem;">#ec4899</code>
            </div>
          </div>
          <div class="actions" style="display: flex; gap: 10px; margin-top: auto;">
            <button onclick="copyColor('#6366f1')" style="flex:1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer;">Copy Indigo</button>
            <button onclick="copyColor('#ec4899')" style="flex:1; padding: 10px; border-radius: 8px; border: none; background: var(--text); color: white; cursor: pointer;">Copy Pink</button>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-container">
        <div class="footer-brand">
          <h2>UIverse</h2>
          <p>The premium choice for vanilla components.</p>
        </div>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
