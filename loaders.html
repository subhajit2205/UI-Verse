  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <aside class="sidebar">
    <h2>UIverse</h2>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="button.html">Buttons</a></li>
      <li><a href="cards.html">Cards</a></li>
      <li><a href="inputs.html">Inputs</a></li>
      <li><a href="form.html">Forms</a></li>
      <li><a href="navbar.html">Navbars</a></li>
      <li><a href="footer.html">Footers</a></li>
      <li><a href="alerts.html">Alerts</a></li>
      <li><a href="badges.html">Badges</a></li>
      <li><a href="loaders.html">Loaders</a></li>
      <li><a href="pricing.html">Pricing</a></li>
      <li><a href="color.html">Colors</a></li>
    </ul>
    <button id="theme-toggle">🌙 Dark Mode</button>
  </aside>

  <div class="sidebar-backdrop"></div>

  <div class="content-wrapper">
    <nav class="navbar">
      <div class="nav-left">
        <button class="menu-toggle">☰</button>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Search loaders..." />
        </div>
      </div>
      <div class="nav-right">
        <button class="nav-btn ghost">My Collection</button>
        <button class="nav-btn primary">Add Component</button>
      </div>
    </nav>

    <main class="main">
      <div class="page-header" style="margin-bottom: 40px;">
        <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 10px;">Loaders</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem;">Animated loading states to keep your users engaged during waits.</p>
      </div>

      <div class="features">
        <div class="component-card" data-name="spinner loader animation">
          <h3>Spinner</h3>
          <div style="padding: 40px 0; display: flex; justify-content: center;">
            <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
          </div>
          <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
          <div class="actions" style="display: flex; gap: 10px; margin-top: auto;">
            <button onclick="toggleCode('l1')" style="flex:1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer;">Code</button>
            <button onclick="copyCode('l1', this)" style="flex:1; padding: 10px; border-radius: 8px; border: none; background: var(--text); color: white; cursor: pointer;">Copy</button>
          </div>
          <pre id="l1" class="code-block">&lt;div class="ui-spinner"&gt;&lt;/div&gt;</pre>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-container">
        <div class="footer-brand">
          <h2>UIverse</h2>
          <p>Premium vanilla components.</p>
        </div>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
