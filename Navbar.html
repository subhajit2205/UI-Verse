<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbars - UIverse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>UIverse</h2>  
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="button.html">Buttons</a></li>
      <li class="active"><a href="navbar.html">Navbars</a></li>
    </ul>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Page Header -->
    <div class="page-header">
      <h1>Navbars</h1>
      <p>Reusable and modern navigation bars</p>
    </div>

   <div class="nav-page">


    <!-- Simple Navbar -->
    <div id="Simple-navbar" class="component-card">
      <h3>Simple Navbar</h3>

      <div class="nav-preview">
        <nav class="nav-simple nav-links">
          <h4>UIverse</h4>
          <div>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
          </div>
        </nav>
      </div>
    </div>

    <!-- Center Navbar -->
    <div id="centered-navbar" class="component-card">
      <h3>Centered Navbar</h3>

      <div class="nav-preview">
        <nav class="nav-center nav-links">
          <a href="#">Home</a>
          <a href="#">Features</a>
          <a href="#">Docs</a>
        </nav>
      </div>
    </div>

    <!-- Button Navbar -->
    <div id="Button-navbar" class="component-card">
      <h3>Button Navbar</h3>

      <div class="nav-preview">
        <nav class="nav-btn">
          <h4>UIverse</h4>
          <button>Login</button>
        </nav>
      </div>
    </div>

    </div>

  </main>

</div>

<script src="script.js"></script>
