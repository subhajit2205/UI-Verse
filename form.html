<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forms - UIverse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <aside class="sidebar">
    <h2>UIverse</h2>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="button.html">Buttons</a></li>
      <li><a href="cards.html">Cards</a></li>
      <li><a href="inputs.html">Inputs</a></li>
      <li><a href="form.html">Forms</a></li>
      <li><a href="navbar.html">Navbars</a></li>
      <li><a href="footer.html">Footers</a></li>
      <li><a href="alerts.html">Alerts</a></li>
      <li><a href="badges.html">Badges</a></li>
      <li><a href="loaders.html">Loaders</a></li>
      <li><a href="color.html">Colors</a></li>
    </ul>
    <button id="theme-toggle">🌙 Dark Mode</button>
  </aside>

  <div class="sidebar-backdrop"></div>

  <div class="content-wrapper">
    <nav class="navbar">
      <div class="nav-left">
        <button class="menu-toggle">☰</button>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Search forms..." />
        </div>
      </div>
      <div class="nav-right">
        <button class="nav-btn ghost">My Collection</button>
        <button class="nav-btn primary">Add Component</button>
      </div>
    </nav>

    <main class="main">
      <div class="page-header" style="margin-bottom: 40px;">
        <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 10px;">Forms</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem;">Complete form layouts for login, registration, and more.</p>
      </div>

      <div class="features">
        <div class="component-card" data-name="login form minimal">
          <h3>Login Form</h3>
          <div style="padding: 30px; border-radius: 16px; background: #f8fafc; margin: 20px 0; border: 1px solid #eee;">
            <div style="margin-bottom: 15px;">
              <input type="email" placeholder="Email" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;" />
            </div>
            <div style="margin-bottom: 20px;">
              <input type="password" placeholder="Password" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;" />
            </div>
            <button style="width: 100%; padding: 12px; border-radius: 8px; background: var(--primary); color: white; border: none; font-weight: 600;">Login</button>
          </div>
          <div class="actions" style="display: flex; gap: 10px; margin-top: auto;">
            <button onclick="toggleCode('f1')" style="flex:1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer;">Code</button>
            <button onclick="copyCode('f1', this)" style="flex:1; padding: 10px; border-radius: 8px; border: none; background: var(--text); color: white; cursor: pointer;">Copy</button>
          </div>
          <pre id="f1" class="code-block">&lt;form class="ui-form"&gt;...&lt;/form&gt;</pre>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-container">
        <div class="footer-brand">
          <h2>UIverse</h2>
          <p>The premium choice for vanilla components.</p>
        </div>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
